<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment Showcase</title>
  <style>
    :root {
      --bg: #f7fbff;
      --surface: #ffffff;
      --text: #16324f;
      --muted: #5f7690;
      --accent: #8ec5ff;
      --accent-dark: #5da8f6;
      --border: #dfefff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background: linear-gradient(120deg, #f8fcff 0%, #eef8ff 35%, #dcefff 70%, #c4e2ff 100%);
      background-size: 200% 200%;
      animation: drift 12s ease infinite;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background: radial-gradient(circle at 20% 20%, rgba(93, 168, 246, 0.18), transparent 28%),
                  radial-gradient(circle at 80% 10%, rgba(120, 199, 255, 0.2), transparent 24%),
                  radial-gradient(circle at 50% 80%, rgba(142, 197, 255, 0.16), transparent 30%);
      filter: blur(12px);
      animation: pulse 10s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: -1;
      transition: background 0.2s ease-out;
    }

    @keyframes drift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulse {
      from { transform: scale(1); opacity: 0.8; }
      to { transform: scale(1.08); opacity: 1; }
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 24px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(22, 50, 79, 0.06);
      margin-bottom: 24px;
    }

    .title h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
      color: var(--text);
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: #eaf6ff;
      color: var(--accent-dark);
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .labs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(22, 50, 79, 0.05);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      color: var(--text);
    }

    .card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .status {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .status.done {
      background: #eaf8ef;
      color: #2f7a4a;
    }

    .status.soon {
      background: #f2f7ff;
      color: #4f7cb3;
    }

    .card a {
      display: inline-block;
      text-decoration: none;
      color: var(--accent-dark);
      font-weight: 600;
    }

    .card a:hover {
      color: var(--text);
    }

    @media (max-width: 820px) {
      .labs {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="title">
        <h1>Labs Game Development</h1>
        <p>นางสาวสุจามาณี อิศรางกูร ณ อยุธยา 683380315-0</p>
        <p>Section CS1</p>
      </div>

    </header>

    <section class="labs">
      <article class="card">
        <span class="status done">เสร็จสิ้น</span>
        <h2>Lab 01</h2>
        <p>แบบฝึดหัดที่ 1 สร้างฉากแนะนำตนเอง ด้วย Godot</p>
        <a href="lab01.html">เปิดดู Lab 01  ></a>
      </article>

      <article class="card">
        <span class="status soon">ยังไม่เสร็จ</span>
        <h2>Lab 02</h2>
        <p>ยังไม่มีรายละเอียด</p>
        <a href="#">ยังไม่เปิด</a>
      </article>

      <article class="card">
        <span class="status soon">ยังไม่เสร็จ</span>
        <h2>Lab 03</h2>
        <p>ยังไม่มีรายละเอียด</p>
        <a href="#">ยังไม่เปิด</a>
      </article>
    </section>
  </div>
  <script>
    const body = document.body;
    const glow = window.getComputedStyle(body, '::before');

    window.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      body.style.setProperty('--mouse-x', `${x}%`);
      body.style.setProperty('--mouse-y', `${y}%`);
      document.body.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(93, 168, 246, 0.26), rgba(120, 199, 255, 0.16) 24%, rgba(248, 252, 255, 0.95) 65%, #eef8ff 100%)`;
    });

    window.addEventListener('mouseleave', () => {
      document.body.style.background = 'linear-gradient(120deg, #f8fcff 0%, #eef8ff 35%, #dcefff 70%, #c4e2ff 100%)';
    });
  </script>
</body>
</html>
